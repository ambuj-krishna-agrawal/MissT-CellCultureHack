[workspace]
name = "MissT-CellCultureHack"
version = "0.1.0"
description = "Standalone UR scripts (socket + ur_rtde) for robot and Robotiq gripper"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "win-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.8,<3.9"
pip = "*"

[pypi-dependencies]
ur-rtde = ">=1.5.0"

[tasks]
# Example: pixi run ur-left-right -- <robot_ip>
ur-left-right = "python ur_left_right.py"
